name: Build 5.4 Kernel Module (Cached)

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-22.04 
    
    steps:
      - name: 1. 检出你的驱动源码 💾
        uses: actions/checkout@v3

      - name: 2. 安装编译核心依赖 📦
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison flex libssl-dev lld

      - name: 3. 尝试挂载云端环境缓存 📦
        uses: actions/cache@v3
        id: cache-env
        with:
          path: |
            android-ndk-r23c
            kernel_src
          key: kernel-env-5.4-v2

      - name: 4. 按需下载 NDK (缓存未命中时执行) 🚀
        if: steps.cache-env.outputs.cache-hit != 'true'
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r23c-linux.zip
          unzip -q android-ndk-r23c-linux.zip
          
      - name: 5. 按需下载内核源码 (缓存未命中时执行) 🗄️
        if: steps.cache-env.outputs.cache-hit != 'true'
        run: |
          git clone https://android.googlesource.com/kernel/common -b android-5.4 --depth=1 kernel_src

      - name: 6. 强制伪造完整的内核版本号 (核心突破口) 🏷️
        run: |
          cd kernel_src
          # 强行擦除官方默认版本，精准匹配 5.4.210-qgki-g5e917c3bcca0
          sed -i 's/^VERSION =.*/VERSION = 5/' Makefile
          sed -i 's/^PATCHLEVEL =.*/PATCHLEVEL = 4/' Makefile
          sed -i 's/^SUBLEVEL =.*/SUBLEVEL = 210/' Makefile
          sed -i 's/^EXTRAVERSION =.*/EXTRAVERSION = -qgki-g5e917c3bcca0/' Makefile
          
      - name: 7. 组装编译链并执行编译 ⚙️
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export KERNEL_DIR=$GITHUB_WORKSPACE/kernel_src
          export NDK_DIR=$GITHUB_WORKSPACE/android-ndk-r23c
          
          export CC=$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/bin/clang
          export CROSS_COMPILE=$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android-
          export LD=ld.lld
          
          # 强行注入你的原厂专属图纸
          cp $GITHUB_WORKSPACE/OPPO_Reno10_5G_5.4.210-qgki-g5e917c3bcca0_config $KERNEL_DIR/.config
          
          # 激活图纸环境并编译模块
          make -C $KERNEL_DIR ARCH=arm64 modules_prepare
          make -C $KERNEL_DIR M=$GITHUB_WORKSPACE modules
          
      - name: 8. 提取战利品 🏆
        uses: actions/upload-artifact@v3
        with:
          name: My_OPPO_5_4_Driver
          path: ./*.ko
